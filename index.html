<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線交差パズル</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- エラー/通知バナー -->
  <!-- BUG-D 修正済み構造: banner-text + banner-close -->
  <div id="model-error-banner" style="display:none;">
    <span class="banner-text"></span>
    <button class="banner-close" aria-label="Close">✕</button>
  </div>

  <!-- ========== スタート画面 ========== -->
  <div id="screen-start" class="screen active">
    <div class="start-wrapper">

      <h1 class="app-title">線交差パズル</h1>
      <p class="app-sub">AIが毎回新しい問題を生成します</p>

      <!-- レベル選択 -->
      <div class="level-selector">
        <p class="level-label">難易度を選んでください</p>
        <div class="level-buttons">
          <button class="btn-level" data-level="0">Lv.1<br><small>かんたん</small></button>
          <button class="btn-level" data-level="1">Lv.2<br><small>ふつう</small></button>
          <button class="btn-level" data-level="2">Lv.3<br><small>むずかしい</small></button>
          <button class="btn-level" data-level="3">Lv.4<br><small>激むず</small></button>
        </div>
      </div>

      <!-- ERR-1 修正: id="btn-toggle-api" を正しく設定 -->
      <!-- ERR-2 修正: id="btn-start" を正しく設定 -->
      <div class="start-actions">
        <button id="btn-start" class="btn-start">はじめる</button>

        <button id="btn-toggle-api" class="btn-small">
          <i class="fa-solid fa-key"></i> AIで問題を作る（Gemini APIキー）
        </button>

        <!-- APIキー入力パネル（初期非表示） -->
        <div id="api-key-panel" style="display:none;" class="api-key-panel">
          <input
            id="input-api-key"
            type="password"
            placeholder="Gemini API キーを入力"
            class="api-key-input"
            autocomplete="off"
          >
          <button id="btn-save-api" class="btn-small btn-primary">
            <i class="fa-solid fa-floppy-disk"></i> 保存
          </button>
        </div>

        <button id="btn-admin-model" class="btn-admin-link">
          <i class="fa-solid fa-gear"></i> 管理者設定
        </button>
      </div>

    </div>
  </div>

  <!-- ========== ゲーム画面 ========== -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <button id="btn-home" class="btn-icon">
        <i class="fa-solid fa-house"></i>
      </button>
      <div class="progress-area">
        <span id="progress-text">1 / 5</span>
      </div>
      <div class="score-area">
        スコア: <span id="score-val">0</span>
      </div>
    </div>

    <div class="game-main">
      <!-- お手本キャンバス -->
      <div class="canvas-wrapper">
        <p class="canvas-label">お手本</p>
        <canvas id="canvas-model"></canvas>
      </div>

      <!-- 解答キャンバス -->
      <div class="canvas-wrapper">
        <p class="canvas-label">あなたの解答</p>
        <div class="canvas-answer-wrap">
          <canvas id="canvas-answer"></canvas>
          <canvas id="canvas-overlay"></canvas>
        </div>
      </div>
    </div>

    <p id="hint-msg" class="hint-msg"></p>

    <div class="action-row">
      <button id="btn-clear" class="btn-sub">
        <i class="fa-solid fa-trash"></i> クリア
      </button>
      <button id="btn-undo" class="btn-sub">
        <i class="fa-solid fa-rotate-left"></i> 戻す
      </button>
      <button id="btn-check" class="btn-primary">
        <i class="fa-solid fa-check"></i> 答え合わせ
      </button>
      <button id="btn-next" class="btn-sub">
        <i class="fa-solid fa-forward"></i> 次へ
      </button>
    </div>

    <!-- 正解フィードバック -->
    <div id="feedback-correct" class="feedback-overlay correct" style="display:none;">
      <div class="feedback-title">🎉 正解！</div>
      <div class="feedback-desc" id="praise-text">Great!</div>
    </div>

    <!-- 不正解フィードバック -->
    <div id="feedback-wrong" class="feedback-overlay wrong" style="display:none;">
      <div class="feedback-title">❌ 残念！</div>
      <div class="feedback-desc">もう一度挑戦！</div>
    </div>
  </div>

  <!-- ========== リザルト画面 ========== -->
  <div id="screen-result" class="screen">
    <div class="result-wrapper">
      <h2 class="result-title">結果発表</h2>
      <div class="result-score-wrap">
        <span id="result-score" class="result-score">0 / 5</span>
      </div>
      <div class="result-actions">
        <button id="btn-retry" class="btn-primary">
          <i class="fa-solid fa-rotate-right"></i> もう一度
        </button>
        <button id="btn-result-home" class="btn-sub">
          <i class="fa-solid fa-house"></i> トップへ
        </button>
      </div>
    </div>
  </div>

  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" style="display:none;" class="loading-overlay">
    <div class="spinner"></div>
    <p>AIが問題を生成中...</p>
  </div>

  <!-- スクリプト読み込み順序: problems → canvas → gemini → app -->
  <script src="js/problems.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
