<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者設定 — 線交差パズル</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">

  <div class="admin-page">

    <!-- ヘッダー -->
    <header class="admin-header">
      <a href="index.html" class="admin-back-link">
        <i class="fa-solid fa-arrow-left"></i> ゲームに戻る
      </a>
      <h1 class="admin-header-title">
        <i class="fa-solid fa-gear"></i> 管理者設定
      </h1>
    </header>

    <!-- §1. API キー -->
    <section class="admin-section">
      <h2 class="admin-section-title">
        <i class="fa-solid fa-key"></i> Gemini API キー
      </h2>
      <div class="admin-section-body">
        <div class="form-row">
          <input
            id="input-admin-apikey"
            type="password"
            placeholder="Gemini API キーを入力"
            class="admin-input"
            autocomplete="off"
          >
          <button id="btn-admin-apikey-show" class="admin-btn-icon">表示</button>
          <button id="btn-admin-apikey-save" class="admin-btn-primary">
            <i class="fa-solid fa-floppy-disk"></i> 保存
          </button>
        </div>
        <div id="apikey-status" class="admin-status-msg" style="display:none;"></div>
        <div class="form-row" style="margin-top:0.75rem;">
          <button id="btn-clear-cache" class="admin-btn-secondary">
            <i class="fa-solid fa-trash"></i> モデルキャッシュをクリア
          </button>
        </div>
      </div>
    </section>

    <!-- §2. AI モデル優先度 -->
    <section class="admin-section">
      <h2 class="admin-section-title">
        <i class="fa-solid fa-robot"></i> AI モデル優先度
      </h2>
      <div class="admin-section-body">

        <button id="btn-fetch-models" class="admin-btn-primary">
          <i class="fa-solid fa-cloud-arrow-down"></i> モデル一覧を取得
        </button>
        <div id="model-status" class="admin-status-msg" style="display:none;"></div>

        <div class="priority-grid">
          <!-- 第1優先 -->
          <div class="priority-item">
            <label class="priority-label">
              <span class="priority-badge p1">1st</span> 第1優先
            </label>
            <select id="select-model-1" class="admin-select" disabled>
              <option value="">— モデルを取得してください —</option>
            </select>
          </div>
          <!-- 第2優先 -->
          <div class="priority-item">
            <label class="priority-label">
              <span class="priority-badge p2">2nd</span> 第2優先
            </label>
            <select id="select-model-2" class="admin-select" disabled>
              <option value="">— なし —</option>
            </select>
          </div>
          <!-- 第3優先 -->
          <div class="priority-item">
            <label class="priority-label">
              <span class="priority-badge p3">3rd</span> 第3優先
            </label>
            <select id="select-model-3" class="admin-select" disabled>
              <option value="">— なし —</option>
            </select>
          </div>
        </div>

        <!-- ERR-3 修正: save-row を select の外に配置し、ボタンIDを正確に設定 -->
        <div class="save-row">
          <button id="btn-save-chain" class="admin-btn-primary">
            <i class="fa-solid fa-floppy-disk"></i> 優先順位を保存
          </button>
          <button id="btn-clear-chain" class="admin-btn-danger">
            <i class="fa-solid fa-rotate-left"></i> リセット
          </button>
        </div>

        <div class="current-chain-wrap">
          <p class="current-chain-label">現在のチェーン:</p>
          <div id="current-chain-display" class="current-chain-display">
            <span class="chain-empty">未設定（フォールバック使用）</span>
          </div>
        </div>

      </div>
    </section>

    <!-- §3. 実行ログ / エラー状況 -->
    <section class="admin-section">
      <h2 class="admin-section-title">
        <i class="fa-solid fa-chart-line"></i> 実行ログ / エラー状況
      </h2>
      <div class="admin-section-body">

        <!-- ステータスカード -->
        <div class="status-card-grid">
          <div class="status-card">
            <div class="status-card-label">累計エラー数</div>
            <div id="status-error-count" class="status-card-value">0</div>
          </div>
          <div class="status-card">
            <div class="status-card-label">最後の成功モデル</div>
            <div id="status-last-model" class="status-card-value">—</div>
          </div>
          <div class="status-card">
            <div class="status-card-label">設定更新</div>
            <div id="status-needs-update" class="status-card-value">正常</div>
          </div>
        </div>

        <!-- 直近エラー -->
        <div id="status-last-error" class="recent-error-box" style="display:none;"></div>

        <!-- ERR-4 修正: ログリストを table 形式に変更 -->
        <div class="log-table-wrap">
          <table class="log-table">
            <thead>
              <tr>
                <th class="log-th-ts">日時</th>
                <th class="log-th-level">種別</th>
                <th class="log-th-msg">メッセージ</th>
              </tr>
            </thead>
            <tbody id="admin-log-list">
              <tr><td colspan="3" class="log-empty">ログなし</td></tr>
            </tbody>
          </table>
        </div>

        <div class="log-actions">
          <button id="btn-clear-log" class="admin-btn-secondary">
            <i class="fa-solid fa-trash"></i> ログをクリア
          </button>
          <button id="btn-refresh-status" class="admin-btn-secondary">
            <i class="fa-solid fa-arrows-rotate"></i> ステータス更新
          </button>
        </div>

      </div>
    </section>

    <!-- §4. アラートログ -->
    <section class="admin-section">
      <h2 class="admin-section-title">
        <i class="fa-solid fa-triangle-exclamation"></i> アラートログ
      </h2>
      <div class="admin-section-body">

        <div class="status-card-grid">
          <div class="status-card">
            <div class="status-card-label">アラート件数</div>
            <div id="alert-count" class="status-card-value">0</div>
          </div>
        </div>

        <ul id="alert-log-list" class="alert-log-list">
          <li class="log-empty">アラートなし</li>
        </ul>

        <div class="log-actions">
          <button id="btn-clear-alert-log" class="admin-btn-danger">
            <i class="fa-solid fa-trash"></i> アラートログをクリア
          </button>
        </div>

      </div>
    </section>

  </div><!-- /.admin-page -->

  <script src="js/gemini.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
